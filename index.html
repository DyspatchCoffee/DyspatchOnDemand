const SUPABASE_URL = "https://yvyfajhmkpvwxfjxtmoq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2eWZhamhta3B2d3hmanh0bW9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjk1MzEsImV4cCI6MjA5MzkwNTUzMX0.UDab64k7rTeEO8uN1zXGd2dUD3OhgJ9Bn8X_WtxukIM";
 
const sb = {
  headers: {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  },
 
  async getOrders() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, { headers: this.headers });
      if (!res.ok) return [];
      return await res.json();
    } catch (e) { return []; }
  },
 
  async insertOrder(order) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
        method: "POST",
        headers: { ...this.headers, "Prefer": "return=representation" },
        body: JSON.stringify({
          order_id: order.id,
          first_name: order.firstName,
          last_name: order.lastName,
          phone: order.phone,
          email: order.email || null,
          notes: order.notes || null,
          items: order.items,
          subtotal: order.subtotal,
          tax: order.tax,
          total: order.total,
          pay_option: order.payOption,
          status: "placed",
        }),
      });
      if (!res.ok) { console.error("Insert order failed:", await res.text()); return null; }
      const data = await res.json();
      return data[0] || null;
    } catch (e) { console.error("insertOrder error:", e); return null; }
  },
 
  async updateOrderStatus(orderId, status) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_id=eq.${orderId}`, {
        method: "PATCH",
        headers: { ...this.headers, "Prefer": "return=minimal" },
        body: JSON.stringify({ status }),
      });
      return res.ok;
    } catch (e) { console.error("updateOrderStatus error:", e); return false; }
  },
 
  async loginAdmin(email, password) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { ...this.headers, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data.access_token ? { email, token: data.access_token, ts: Date.now() } : null;
    } catch (e) { console.error("loginAdmin error:", e); return null; }
  },
 
  subscribeToOrders(callback) {
    // Polls every 8 seconds for new orders (real-time websocket upgrade available later)
    const interval = setInterval(async () => {
      const orders = await this.getOrders();
      callback(orders);
    }, 8000);
    return () => clearInterval(interval);
  },
};

// ── SHOPIFY CHECKOUT ──────────────────────────────────────────────────────────
 
function buildShopifyCheckoutUrl(items, customerInfo) {
  const lineItems = [];
  let perfCount = 0;
  const teeItems = [];
 
  items.forEach(item => {
    let variantId = null;
    if (item.name.includes("Nitro")) variantId = VARIANTS.nitro_12oz;
    else if (item.name.includes("1 Liter")) variantId = VARIANTS.cold_brew_1liter;
    else if (item.name.includes("16 oz")) variantId = VARIANTS.cold_brew_16oz;
    else if (item.name.includes("12 oz") && !item.name.includes("Nitro")) variantId = VARIANTS.cold_brew_12oz;
    else if (item.name.includes("Tee")) { teeItems.push(item); return; }
 
    if (variantId) lineItems.push(`${variantId}:${item.qty}`);
    if (item.customization && item.customization.includes("Performance Stack")) {
      perfCount += item.qty;
    }
  });
 
  // Add performance stack as separate line item
  if (perfCount > 0) {
    lineItems.push(`${VARIANTS.perf_stack}:${perfCount}`);
  }
 
  // Build order note with full customization details
  const noteLines = [];
  noteLines.push(`DYSPATCH GO APP ORDER`);
  noteLines.push(`Customer: ${customerInfo.firstName} ${customerInfo.lastName} | Phone: ${customerInfo.phone}`);
  if (customerInfo.email) noteLines.push(`Email: ${customerInfo.email}`);
  noteLines.push(`---`);
  items.forEach(item => {
    let line = `${item.qty}x ${item.name}`;
    if (item.customization) line += ` (${item.customization})`;
    noteLines.push(line);
  });
  if (customerInfo.notes) noteLines.push(`Special: ${customerInfo.notes}`);
 
  const note = encodeURIComponent(noteLines.join(" | "));
 
  // If they have tee items, open product page separately
  if (teeItems.length > 0 && lineItems.length === 0) {
    return `https://${SHOP_DOMAIN}/products/dyspatch-tee`;
  }
 
  const cartPath = lineItems.join(",");
  if (!cartPath) return null;
  return `https://${SHOP_DOMAIN}/cart/${cartPath}?note=${note}`;
}

function AdminLogin({ onSuccess }) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [shake, setShake] = useState(false);
 
  const handleLogin = async () => {
    if (!email || !pass) { setError("Enter your credentials."); return; }
    setLoading(true); setError("");
    // Try Supabase Auth first, fallback to local demo credentials
    let session = await sb.loginAdmin(email.trim(), pass);
    if (!session) {
      // Fallback for demo mode (remove after Supabase Auth user is created)
      if (email.trim().toLowerCase() === ADMIN_EMAIL && pass === ADMIN_PASS) {
        session = { email: email.trim().toLowerCase(), ts: Date.now() };
      }
    }
    if (session) {
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch (e) {}
      onSuccess(session);
    } else {
      setLoading(false);
      setError("Invalid credentials. Access denied.");
      setShake(true);
      setTimeout(() => setShake(false), 600);

  };
 
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: B.bg, overflow: "hidden" }}>

      <div style={{ background: `linear-gradient(to right, ${B.orange}, #C45E1E)`, padding: "52px 22px 20px" }}>

        <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, color: "#00000066", letterSpacing: "0.16em", marginTop: 2 }}>AUTHORIZED ACCESS ONLY</div>
      </div>
 
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "32px 24px" }}>
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ width: 60, height: 60, background: B.card, border: `1px solid ${B.border}`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px" }}><LockIcon size={26} /></div>
          <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 18, color: B.white, marginBottom: 4 }}>Secure Login</div>
          <div style={{ fontSize: 10, color: B.muted, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.18em" }}>AUTHORIZED PERSONNEL ONLY</div>
        </div>
 
        <div style={{ animation: shake ? "shake 0.4s ease" : "none" }}>
          <InputField label="Admin Email" value={email} onChange={setEmail} placeholder="admin@dyspatchcoffee.com" type="email" required />
          <InputField label="Password" value={pass} onChange={setPass} placeholder="••••••••••" isPassword required />
        </div>
 
        {error && (
          <div style={{ background: "#EF444412", border: "1px solid #EF444430", padding: "10px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
            <WarningIcon size={16} />
            <span style={{ fontSize: 12, color: "#FCA5A5", fontFamily: "'Barlow',sans-serif" }}>{error}</span>
          </div>
        )}
 
        <Btn onClick={handleLogin} disabled={loading}>
          {loading ? (
            <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid #00000030", borderTopColor: "#000", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
              AUTHENTICATING...
            </span>
          ) : "ACCESS COMMAND CENTER →"}
        </Btn>
 
        <div style={{ marginTop: 24, textAlign: "center", fontSize: 9, color: B.dim, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.14em", lineHeight: 1.8 }}>
          PRODUCTION: CONNECT SUPABASE AUTH<br />FOR ENCRYPTED CREDENTIAL STORAGE
        </div>
      </div>
    </div>
  );
}
 
// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
 
function AdminDashboard({ orders: localOrders, onUpdateStatus, onDeleteOrder, session, onLogout }) {
  const [dbOrders, setDbOrders] = useState(null); // null = loading
  const [loadError, setLoadError] = useState(false);
 
  useEffect(() => {
    // Initial load
    sb.getOrders().then(data => {
      if (Array.isArray(data)) {
        // Merge DB orders with local optimistic orders
        setDbOrders(data.map(o => ({
          id: o.order_id,
          firstName: o.first_name,
          lastName: o.last_name,
          phone: o.phone,
          email: o.email,
          notes: o.notes,
          items: o.items,
          subtotal: o.subtotal,
          tax: o.tax,
          total: o.total,
          payOption: o.pay_option,
          status: o.status,
          ts: new Date(o.created_at).getTime(),
        })));
      } else {
        setLoadError(true);
        setDbOrders([]);
      }
    });
    // Subscribe for live updates
    const unsub = sb.subscribeToOrders(data => {
      if (Array.isArray(data)) {
        setDbOrders(data.map(o => ({
          id: o.order_id,
          firstName: o.first_name,
          lastName: o.last_name,
          phone: o.phone,
          email: o.email,
          notes: o.notes,
          items: o.items,
          subtotal: o.subtotal,
          tax: o.tax,
          total: o.total,
          payOption: o.pay_option,
          status: o.status,
          ts: new Date(o.created_at).getTime(),
        })));
      }
    });
    return unsub;
  }, []);
 
  // Use DB orders if loaded, otherwise fall back to local
  const orders = dbOrders !== null ? dbOrders : localOrders;
 
  const handleUpdateStatus = async (id, status) => {
    onUpdateStatus(id, status); // optimistic local
    await sb.updateOrderStatus(id, status); // persist to DB
    // Refresh
    const data = await sb.getOrders();
    if (Array.isArray(data)) {
      setDbOrders(data.map(o => ({
        id: o.order_id, firstName: o.first_name, lastName: o.last_name,
        phone: o.phone, email: o.email, notes: o.notes, items: o.items,
        subtotal: o.subtotal, tax: o.tax, total: o.total,
        payOption: o.pay_option, status: o.status,
        ts: new Date(o.created_at).getTime(),
      })));
    }
  };
 
  // Override onUpdateStatus with the DB-aware version
  onUpdateStatus = handleUpdateStatus;
 
  const [tab, setTab] = useState("active");
  const sc = { placed: B.orange, received: "#F59E0B", completed: B.green, done: B.dim, making: "#F59E0B", ready: B.green, deleted: B.dim };
  const sl = { placed: "RECEIVED", making: "MAKING", ready: "READY", done: "DONE" };
  const active = orders.filter(o => o.status !== "done");
  const done = orders.filter(o => o.status === "done");
  const revenue = done.reduce((s, o) => s + o.total, 0);
 
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: B.bg, overflow: "hidden" }}>
      {/* Editorial admin header */}
      <div style={{ padding: "48px 20px 0", background: B.surface, borderBottom: `1px solid ${B.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <EyebrowLabel color={B.orange}>Dyspatch Command</EyebrowLabel>
            <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, color: B.white, fontWeight: 600 }}>Command Center</div>
            <div style={{ fontSize: 9, color: B.muted, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.14em", marginTop: 2 }}>{session?.email?.toUpperCase()}</div>
          </div>
          <button onClick={onLogout} style={{ background: "#EF444412", border: "1px solid #EF444430", padding: "7px 14px", cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 11, color: "#FCA5A5", letterSpacing: "0.1em" }}>LOGOUT</button>
        </div>
 
        {/* Stat row — Luxe grid style */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
          {[["ACTIVE", active.length, B.orange], ["COMPLETED", done.length, B.green], ["REVENUE", fmt(revenue), B.gold]].map(([label, val, color]) => (
            <div key={label} style={{ background: B.card, border: `1px solid ${B.border}`, padding: "10px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 8, color: B.muted, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.16em", marginBottom: 3 }}>{label}</div>
              <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 18, color }}>{val}</div>
            </div>
          ))}
        </div>
 
        {/* Tabs */}
        <div style={{ display: "flex" }}>
          {[["active", "ACTIVE"], ["done", "COMPLETED"]].map(([k, label]) => (
            <button key={k} onClick={() => setTab(k)} style={{ flex: 1, border: "none", borderBottom: `2px solid ${tab === k ? B.orange : "transparent"}`, background: "transparent", color: tab === k ? B.orange : B.muted, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: "0.14em", padding: "10px 0", cursor: "pointer", transition: "all 0.15s" }}>
              {label} ({k === "active" ? active.length : done.length})
            </button>
          ))}
        </div>
      </div>
 
      {dbOrders === null && (
        <div style={{ padding: "32px 20px", textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 20, height: 20, border: `2px solid ${B.border}`, borderTopColor: B.orange, borderRadius: "50%", animation: "spin 0.8s linear infinite", marginBottom: 12 }} />
          <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, color: B.muted, letterSpacing: "0.16em" }}>LOADING ORDERS...</div>
        </div>
      )}
      {loadError && (
        <div style={{ margin: "16px 20px", background: "#EF444412", border: "1px solid #EF444430", padding: "12px 14px" }}>
          <div style={{ fontSize: 11, color: "#FCA5A5", fontFamily: "'Barlow',sans-serif" }}>Could not connect to database. Showing local orders only. Check Supabase table setup.</div>
        </div>
      )}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px 32px" }}>
        {tab === "active" && (
          <>
            {active.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 20px" }}>
                <div style={{ marginBottom: 14 }}><InboxIcon size={44} /></div>
                <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, color: B.muted, letterSpacing: "0.18em" }}>NO ACTIVE ORDERS. STANDING BY.</div>
              </div>
            )}
            {active.map(o => (
              <div key={o.id} style={{ background: B.card, padding: "16px", marginBottom: 10, border: `1px solid ${sc[o.status]}33`, position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: sc[o.status] }} />
                <div style={{ paddingLeft: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div>
                      <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 18, color: B.white, letterSpacing: "0.04em" }}>{o.firstName.toUpperCase()} {o.lastName.toUpperCase()}</div>
                      <div style={{ fontSize: 9, color: B.muted, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.1em" }}>{o.phone} · {o.id}</div>
                    </div>
                    <div style={{ fontSize: 9, fontWeight: 700, padding: "3px 10px", background: sc[o.status] + "18", color: sc[o.status], border: `1px solid ${sc[o.status]}33`, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em", whiteSpace: "nowrap" }}>{sl[o.status]}</div>
                  </div>
                  {o.items.map((item, i) => (
                    <div key={i} style={{ marginBottom: 3 }}>
                      <div style={{ fontSize: 12, color: B.text, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.04em" }}>{item.name} × {item.qty}</div>
                      {item.customization && <div style={{ fontSize: 10, color: B.orange, fontFamily: "'Barlow Condensed',sans-serif", paddingLeft: 18 }}>↳ {item.customization}</div>}
                    </div>
                  ))}
                  {o.notes && <div style={{ fontSize: 10, color: "#F59E0B", marginTop: 6, fontFamily: "'Barlow',sans-serif", fontStyle: "italic" }}>NOTE: {o.notes}</div>}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12 }}>
                    <div>
                      <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 18, color: B.orange }}>{fmt(o.total)}</span>
                      <span style={{ fontSize: 9, color: B.muted, marginLeft: 8, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.1em" }}>{o.payOption === "now" ? "PAID" : "ON ARRIVAL"}</span>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      {o.status === "placed" && <button onClick={() => onUpdateStatus(o.id, "received")} style={{ background: B.orange, border: "none", padding: "7px 14px", color: "#000", fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em" }}>RECEIVED</button>}
                      {o.status === "received" && <button onClick={() => onUpdateStatus(o.id, "completed")} style={{ background: B.green, border: "none", padding: "7px 14px", color: "#000", fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em" }}>COMPLETE</button>}
                      {o.status === "completed" && <button onClick={() => onUpdateStatus(o.id, "done")} style={{ background: B.surface, border: `1px solid ${B.border}`, padding: "7px 14px", color: B.muted, fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em" }}>DONE ✓</button>}
                      {(o.status === "making") && <button onClick={() => onUpdateStatus(o.id, "completed")} style={{ background: B.green, border: "none", padding: "7px 14px", color: "#000", fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em" }}>COMPLETE</button>}
                      {(o.status === "ready") && <button onClick={() => onUpdateStatus(o.id, "done")} style={{ background: B.surface, border: `1px solid ${B.border}`, padding: "7px 14px", color: B.muted, fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em" }}>DONE ✓</button>}
                      <button onClick={() => onDeleteOrder(o.id)} style={{ background: "#EF444415", border: "1px solid #EF444430", padding: "7px 10px", color: "#FCA5A5", fontSize: 11, fontWeight: 800, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.1em" }}>✕</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </>
        )}
 
        {tab === "done" && (
          <>
            {done.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 20px" }}>
                <div style={{ marginBottom: 14 }}><ListIcon size={44} /></div>
                <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, color: B.muted, letterSpacing: "0.18em" }}>NO COMPLETED ORDERS YET.</div>
              </div>
            )}
            {done.map(o => (
              <div key={o.id} style={{ background: B.card, border: `1px solid ${B.border}`, padding: "14px 16px", marginBottom: 8, opacity: 0.7 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <div>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 800, fontSize: 15, color: B.white }}>{o.firstName.toUpperCase()} {o.lastName.toUpperCase()}</div>
                    <div style={{ fontSize: 9, color: B.muted, fontFamily: "monospace" }}>{o.id} · {o.phone}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 16, color: B.green }}>{fmt(o.total)}</div>
                    <div style={{ fontSize: 9, color: B.muted, fontFamily: "'Barlow Condensed',sans-serif" }}>{o.payOption === "now" ? "PAID" : "ARRIVAL"}</div>
                  </div>
                </div>
                {o.items.map((item, i) => (
                  <div key={i} style={{ fontSize: 11, color: B.dim, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.04em" }}>{item.name} × {item.qty}{item.customization ? ` — ${item.customization}` : ""}</div>
                ))}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}
 
// ── ROOT ──────────────────────────────────────────────────────────────────────
 
export default function App() {
  const [screen, setScreen] = useState("splash");
  const [cart, setCart] = useState({});
  const [currentOrder, setCurrentOrder] = useState(null);
  const [orders, setOrders] = useState([]);
  const [adminSession, setAdminSession] = useState(null);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
 
  useEffect(() => {
    try {
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        const session = JSON.parse(saved);
        if (Date.now() - session.ts < 86400000) setAdminSession(session);
        else localStorage.removeItem(SESSION_KEY);
      }
    } catch (e) {}
  }, []);
 
  const addItem = item => setCart(p => ({
    ...p,
    [item.id]: p[item.id] ? { ...p[item.id], qty: p[item.id].qty + 1 } : { ...item, qty: 1 },
  }));
 
  const placeOrder = async (data) => {
    const o = { ...data, id: uid(), status: "placed", ts: Date.now() };
    // Optimistic UI — show confirm immediately
    setOrders(p => [o, ...p]);
    setCurrentOrder(o);
    setCart({});
    setScreen("confirm");
    // Write to Supabase in background
    await sb.insertOrder(o);
  };
 
  const handleLogout = () => {
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    setAdminSession(null);
    setShowAdminLogin(false);
    setScreen("menu");
  };
 
  const handleAdminSuccess = session => {
    setAdminSession(session);
    setShowAdminLogin(false);
    setScreen("admin");
  };
 
  if (showAdminLogin && !adminSession) {
    return (
      <div style={{ width: "100%", maxWidth: 430, margin: "0 auto", height: "100dvh", display: "flex", flexDirection: "column", background: B.bg, overflow: "hidden", fontFamily: "'Barlow',sans-serif" }}>
        <style>{FONTS}</style>
        <AdminLogin onSuccess={handleAdminSuccess} />
      </div>
    );
  }
 
  return (
    <div style={{ width: "100%", maxWidth: 430, margin: "0 auto", height: "100dvh", display: "flex", flexDirection: "column", background: B.bg, position: "relative", overflow: "hidden", fontFamily: "'Barlow',sans-serif" }}>
      <style>{FONTS}</style>
 
      {screen === "splash" && <SplashScreen onContinue={() => setScreen("menu")} />}
 
      {screen === "menu" && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
          <MenuScreen cart={cart} onAddItem={addItem} onViewCart={() => setScreen("cart")} />
          {/* Discreet admin access dot */}
          <button onClick={() => adminSession ? setScreen("admin") : setShowAdminLogin(true)}
            style={{ position: "absolute", bottom: 10, right: 10, background: "transparent", border: "none", cursor: "pointer", padding: 8, opacity: 0.12, zIndex: 50 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: B.orange }} />
          </button>
        </div>
      )}
 
      {screen === "cart" && <CartScreen cart={cart} setCart={setCart} onBack={() => setScreen("menu")} onPlaceOrder={placeOrder} />}
      {screen === "confirm" && currentOrder && <ConfirmScreen order={currentOrder} onDone={() => { setScreen("menu"); setCurrentOrder(null); }} />}
      {screen === "admin" && adminSession && <AdminDashboard 
        orders={orders} 
        onUpdateStatus={(id, status) => setOrders(p => p.map(o => o.id === id ? { ...o, status } : o))} 
        onDeleteOrder={async (id) => {
          setOrders(p => p.filter(o => o.id !== id));
          await sb.updateOrderStatus(id, "deleted");
        }}
        session={adminSession} 
        onLogout={handleLogout} 
      />}
      {screen === "admin" && !adminSession && <AdminLogin onSuccess={handleAdminSuccess} />}
    </div>
  );
}
 
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
  </script>
</body>
